<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Being Infinity</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: white;
        }

        .l {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 22px;
        }

        .r {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 20px;
        }

        .search {
            text-align: center;
            margin-top: 120px;
        }

        .logo {
            color: blue;
        }

        .ge {
            color: gray;
            font-size: 22px;
            margin-top: 15px;
        }

        .search-container {
            position: relative;
            width: 700px;
            margin: 30px auto 10px;
        }

        .lens {
            position: absolute;
            left: 18px;
            top: 14px;
            font-size: 20px;
            color: #666;
        }

        .box {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid black;
            border-radius: 30px;
            font-size: 18px;
            outline: none;
        }

        #sug {
            width: 700px;
            margin: auto;
        }

        .suggestion {
            border: 1px solid gray;
            border-radius: 10px;
            padding: 12px;
            margin-top: 2px;
            font-size: 18px;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .suggestion:hover {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <span class="l">&#9881;</span>

    <span class="r">&#8226; online | &#9201; - ms</span>

    <div class="search">

        <h1><span class="logo">Being</span> Infinity</h1>

        <p class="ge">
            One million phrases. Four Algorithms. Prefix Based Auto Suggest
        </p>

        <div class="search-container">

            <span class="lens">&#128269;</span>

            <input
                type="text"
                id="box"
                class="box"
                placeholder="Start typing to search">

        </div>

        <div id="sug"></div>

    </div>

    <script>

        var searchBox = document.getElementById("box");
        var suggestionBox = document.getElementById("sug");

        searchBox.addEventListener("input", function () {

            var userInput = searchBox.value.trim();

            if (userInput == "") {
                suggestionBox.innerHTML = "";
                return;
            }

            var url = "https://autosuggest-backend.onrender.com/api/autosuggest?q="
                + userInput +
                "&algorithm=brute&limit=10&weighted=false";

            fetch(url)
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {

                    var resultArray = data.results;

                    var output = "";

                    for (var i = 0; i < resultArray.length; i++) {

                        output +=
                            `<div class="suggestion">
                                ${resultArray[i].text}
                            </div>`;
                    }

                    suggestionBox.innerHTML = output;

                })
                .catch(function () {
                    suggestionBox.innerHTML = "";
                });

        });

    </script>

</body>

</html>
